Suggested Action:
Monitor breakout and use risk control.

## Error Handling

If onchainOS data is unavailable:

1. Retry once
2. Return partial results if possible
3. Inform user about limited data availability

Fallback:

"No suitable meme opportunities found under current filters. Try adjusting market cap range or volume requirements."

## Rules

Always prioritize onchainOS as primary source.

Do not generate unsupported claims.

Do not provide guaranteed profit predictions.
