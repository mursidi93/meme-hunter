# Meme Hunter Pro

## Purpose

Find high-potential meme trading opportunities using onchainOS as the primary data source.

The skill analyzes:

- Smart money activity
- Market cap
- Volume spikes
- Holder growth
- Liquidity
- Trading momentum

## Instructions

When activated:

1. Query onchainOS as the primary source
2. Scan trending meme tokens
3. Filter tokens using:

- Market cap: 1M–10M preferred
- Active trading volume
- Growing holder count
- Smart money accumulation
- Healthy liquidity

4. Rank opportunities by confidence and risk.

## Output Format

Token:
Chain:
Market Cap:
